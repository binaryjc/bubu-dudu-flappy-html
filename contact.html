<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - Bubu & Dudu Flappy</title>
    <meta
      name="description"
      content="Contact the Bubu & Dudu Flappy team for feedback, bug reports, and suggestions for future games."
    />
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7344100376673259"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="index.html">Bubu &amp; Dudu Flappy</a>
        <nav class="main-nav" aria-label="Main navigation">
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
          <a href="privacy.html">Privacy Policy</a>
          <a href="contact.html" aria-current="page">Contact</a>
        </nav>
      </div>
    </header>

    <main class="container page-content">
      <section class="card prose">
        <h1>Contact</h1>
        <p>
          We welcome your feedback, ideas, and bug reports for the Bubu and Dudu game. If something feels
          off or you want new features, let us know.
        </p>
        <p><strong>Email:</strong> albancesjc@gmail.com</p>

        <form class="contact-form" action="#" method="post">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" placeholder="Your name" required />

          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" required />

          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="Share your feedback or report a bug" required></textarea>

          <button type="submit">Send Message</button>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; 2026 Bubu &amp; Dudu Flappy. All rights reserved.</p>
      </div>
    </footer>
  </body>
</html>
