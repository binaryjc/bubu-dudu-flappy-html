    <main class="container page-stack">
      <section class="card prose">
        <h1>Contact</h1>
        <p>
          We welcome feedback, bug reports, and suggestions to improve this cute casual game.
        </p>
        <p><strong>Email:</strong> hello@yourdomain.com</p>

        <form class="contact-form" action="#" method="post">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" placeholder="Your name" required />

          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" required />

          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="Share your feedback or report a bug" required></textarea>

          <button type="submit" class="primary-btn">Send Message</button>
        </form>
      </section>
    </main>
